services:
  - type: web
    name: doel-io
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && ./node_modules/.bin/tsx script/build.ts && ./node_modules/.bin/tsx script/migrate.ts
    startCommand: node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: doel-io-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: doel-io-db
    region: frankfurt
    plan: free
    databaseName: doelio
    user: doelio
