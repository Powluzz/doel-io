services:
  - type: web
    name: doel-ai
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx tsx script/build.ts && npx tsx script/migrate.ts
    startCommand: node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: doel-ai-db
          property: connectionString

databases:
  - name: doel-ai-db
    region: frankfurt
    plan: free
    databaseName: doeiai
    user: doeiai
